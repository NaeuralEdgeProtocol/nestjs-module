name: Version Guard

on:
  push:
    branches:
      - main

jobs:
  version-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run version guard
        run: node scripts/ensure-version-bump.mjs
